version: "3.9"

services:
  backend:
    build:
      context: ./path-nova-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./path-nova-backend/.env
    environment:
      - ENVIRONMENT=production
    volumes:
      - resume_uploads:/tmp/pathnova_uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./path-nova-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  resume_uploads:
